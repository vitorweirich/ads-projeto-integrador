openapi: 3.1.0
info:
  title: File Share API
  version: v1
  description: |
    API para gerenciamento de arquivos com autenticação JWT.

    ## Autenticação
    A maioria dos endpoints (o que tiverem um cadeado) requer um token JWT no header `Authorization: Bearer <token>`.
    Obtenha o token via `/v1/api/auth/login` ou `/v1/api/auth/login/magic-link`.

    Endpoints de MFA intermediários usam um token temporário (`mfaAuth`) retornado
    em `/v1/api/auth/mfa/setup/initiate` ou no login quando MFA está habilitado.

    ## Tokens via Cookie
    Por padrão, os tokens são trafegados como cookies HttpOnly. Para receber os tokens
    no body JSON, envie o header `X-Http-Only: false`.

servers:
  - url: http://localhost:8080
    description: Desenvolvimento local

security:
  - bearerAuth: []

tags:
  - name: auth-controller
    description: Autenticação, registro e gerenciamento de conta
  - name: file-controller
    description: Upload, download e gerenciamento de arquivos
  - name: admin-controller
    description: Operações administrativas (requer role ADMIN)
  - name: session-transfer-controller
    description: Transferência de sessão entre plataformas (web/mobile)
  - name: short-link-controller
    description: Redirecionamento de links curtos de compartilhamento
  - name: health-check-controller
    description: Verificação de saúde da aplicação

paths:
  /v1/files/upload:
    post:
      tags: [file-controller]
      summary: Solicitar URL assinada para upload
      operationId: requestSignedUrlToPostFile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestPostFileDTO"
      responses:
        "200":
          description: URL assinada gerada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignedUrlDTO"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/files/upload/{fileId}/register-uploaded:
    patch:
      tags: [file-controller]
      summary: Marcar arquivo como enviado após upload direto ao storage
      operationId: setFileUploaded
      security:
        - bearerAuth: []
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Arquivo marcado como enviado
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/files/{fileId}:
    get:
      tags: [file-controller]
      summary: Obter URL assinada para download
      operationId: requestSignedUrlToGetFile
      security:
        - bearerAuth: []
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: URL assinada para download
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignedUrlDTO"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [file-controller]
      summary: Deletar arquivo
      operationId: deleteFile
      security:
        - bearerAuth: []
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Arquivo deletado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignedUrlDTO"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/files/me:
    get:
      tags: [file-controller]
      summary: Listar arquivos do usuário autenticado
      operationId: listFiles
      security:
        - bearerAuth: []
      parameters:
        - name: params
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ListFilesRequestParams"
      responses:
        "200":
          description: Lista paginada de arquivos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageFileDTO"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/api/auth/login:
    post:
      tags: [auth-controller]
      summary: Login com email e senha
      operationId: authenticateUser
      security: []
      parameters:
        - name: X-Http-Only
          in: header
          required: false
          description: |
            Controla como os tokens são retornados.
            - `true` (padrão): tokens injetados como cookies HttpOnly, resposta `204`
            - `false`: tokens retornados no body JSON, resposta `200`
          schema:
            type: string
            enum: ["true", "false"]
            default: "true"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: |
            Login bem-sucedido com tokens no body (quando `X-Http-Only: false`).
            Retorna `TokenResponse` se MFA não estiver habilitado,
            ou `MfaJwtResponse` se MFA for necessário.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/TokenResponse"
                  - $ref: "#/components/schemas/MfaJwtResponse"
          headers:
            X-Client-Action:
              schema:
                type: string
                example: refresh-user
        "204":
          description: Login bem-sucedido com tokens injetados como cookies HttpOnly (padrão).
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "access_token=eyJ...; HttpOnly; Secure; Path=/"
            X-Client-Action:
              schema:
                type: string
                example: refresh-user
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/api/auth/login/generate-magic-link:
    post:
      tags: [auth-controller]
      summary: Solicitar magic link por email
      operationId: generateMagicLink
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MagicLoginRequest"
      responses:
        "200":
          description: Magic link enviado para o email (se o email existir)

  /v1/api/auth/login/magic-link:
    get:
      tags: [auth-controller]
      summary: Autenticar via magic link
      operationId: authenticateUserWithMagicLink
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Autenticação bem-sucedida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/api/auth/register:
    post:
      tags: [auth-controller]
      summary: Registrar novo usuário
      operationId: registerUser
      security: []
      parameters:
        - name: invite
          in: query
          required: false
          description: Token de convite (obrigatório se whitelist estiver ativa)
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "200":
          description: Usuário registrado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/api/auth/confirm/{token}:
    get:
      tags: [auth-controller]
      summary: Confirmar email via token
      operationId: confirmEmail
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Email confirmado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/api/auth/invite-info:
    get:
      tags: [auth-controller]
      summary: Obter informações de um convite
      operationId: getInviteInfo
      security: []
      parameters:
        - name: invite
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dados do convite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhitelistEntryDTO"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/api/auth/forgot-password:
    post:
      tags: [auth-controller]
      summary: Solicitar redefinição de senha
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Email de redefinição enviado (se o email existir)

  /v1/api/auth/reset-password:
    post:
      tags: [auth-controller]
      summary: Redefinir senha com token
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Senha redefinida com sucesso
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/api/auth/refresh:
    post:
      tags: [auth-controller]
      summary: Renovar access token
      description: |
        Renova o access token usando o refresh token.

        O refresh token pode ser enviado de duas formas:
        - Cookie HttpOnly `refresh_token` (padrão)
        - Header `X-Refresh-Token: <token>` (para clientes sem suporte a cookies)

        A resposta varia conforme o header `X-Http-Only`:
        - `true` (padrão): retorna `204` e injeta os tokens como cookies HttpOnly
        - `false`: retorna `200` com os tokens no body JSON
      operationId: refresh
      security: []
      parameters:
        - name: X-Refresh-Token
          in: header
          required: false
          description: Refresh token (alternativa ao cookie `refresh_token`)
          schema:
            type: string
        - name: X-Http-Only
          in: header
          required: false
          description: Controla se os tokens são retornados no body (`false`) ou via cookie HttpOnly (padrão)
          schema:
            type: string
            enum: ["true", "false"]
            default: "true"
      responses:
        "200":
          description: "Tokens retornados no body (quando `X-Http-Only: false`)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
          headers:
            X-Client-Action:
              schema:
                type: string
                example: refresh-user
        "204":
          description: Tokens injetados como cookies HttpOnly (comportamento padrão)
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "access_token=eyJ...; HttpOnly; Secure; Path=/"
            X-Client-Action:
              schema:
                type: string
                example: refresh-user
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/api/auth/logout:
    post:
      tags: [auth-controller]
      summary: Encerrar sessão
      description: Invalida o refresh token e limpa os cookies de sessão.
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logout realizado com sucesso

  /v1/api/auth/me:
    get:
      tags: [auth-controller]
      summary: Obter dados do usuário autenticado
      operationId: me
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dados do usuário
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfoDTO"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/api/auth/account:
    delete:
      tags: [auth-controller]
      summary: Deletar conta do usuário autenticado
      operationId: deleteAccount
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Conta deletada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/api/auth/mfa/setup/initiate:
    post:
      tags: [auth-controller]
      summary: Iniciar configuração de MFA
      description: |
        Requer autenticação normal (bearerAuth).
        Retorna um token temporário de MFA (`mfaAuth`) para uso nos próximos passos.
      operationId: startSetupMfa
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token temporário MFA gerado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaJwtResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/api/auth/mfa/setup:
    post:
      tags: [auth-controller]
      summary: Obter QR Code para configuração de MFA
      description: |
        Requer o token temporário MFA obtido em `/v1/api/auth/mfa/setup/initiate`
        no header `Authorization: Bearer <mfa-token>`.
      operationId: setupMfa
      security:
        - mfaAuth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          description: "Token temporário MFA: `Bearer <mfa-token>`"
          schema:
            type: string
            example: "Bearer eyJhbGci..."
      responses:
        "200":
          description: QR Code SVG para configuração no autenticador
          content:
            image/svg+xml:
              schema:
                type: string
                format: byte
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/api/auth/mfa/confirm:
    post:
      tags: [auth-controller]
      summary: Confirmar configuração de MFA com código TOTP
      description: |
        Requer o token temporário MFA obtido em `/v1/api/auth/mfa/setup/initiate`
        no header `Authorization: Bearer <mfa-token>`.
      operationId: confirmMfaSetup
      security:
        - mfaAuth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          description: "Token temporário MFA: `Bearer <mfa-token>`"
          schema:
            type: string
            example: "Bearer eyJhbGci..."
        - name: code
          in: query
          required: true
          description: Código TOTP de 6 dígitos do autenticador
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: MFA configurado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/api/auth/mfa/verify:
    post:
      tags: [auth-controller]
      summary: Verificar código MFA durante login
      description: |
        Usado após login quando MFA está habilitado.
        Requer o token temporário MFA retornado no login
        no header `Authorization: Bearer <mfa-token>`.
      operationId: verifyMfa
      security:
        - mfaAuth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          description: "Token temporário MFA retornado no login: `Bearer <mfa-token>`"
          schema:
            type: string
            example: "Bearer eyJhbGci..."
        - name: code
          in: query
          required: true
          description: Código TOTP de 6 dígitos do autenticador
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: MFA verificado, tokens de sessão retornados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/api/auth/session-transfer:
    post:
      tags: [session-transfer-controller]
      summary: Gerar token de transferência de sessão
      description: Permite transferir a sessão autenticada para outra plataforma (WEB ou MOBILE).
      operationId: generateSessionTransferToken
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionTransferRequest"
      responses:
        "200":
          description: Token de transferência gerado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionTransferResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/api/auth/session-exchange:
    post:
      tags: [session-transfer-controller]
      summary: Trocar token de transferência por sessão ativa
      description: Troca o token de transferência por tokens de sessão válidos na plataforma destino.
      operationId: exchangeSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionExchangeRequest"
      responses:
        "200":
          description: Sessão estabelecida com sucesso
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/admin/whitelist/pending:
    get:
      tags: [admin-controller]
      summary: Listar solicitações de whitelist pendentes
      operationId: listPendingWhitelist
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
        - name: rows
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 20
      responses:
        "200":
          description: Lista paginada de solicitações pendentes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageWhitelistEntryDTO"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/admin/whitelist/{id}/approve:
    post:
      tags: [admin-controller]
      summary: Aprovar solicitação de whitelist
      operationId: approveWhitelist
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Solicitação aprovada
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/whitelist/invite:
    post:
      tags: [admin-controller]
      summary: Convidar email para a plataforma
      operationId: inviteEmail
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteRequest"
      responses:
        "200":
          description: Convite enviado
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # TODO: Ajustar endpoint que tenham queryParams definido como um objeto para a declaração correta dos queryParams
  # Ex: /v1/admin/users, /v1/admin/users, /v1/admin/users
  /v1/admin/users:
    get:
      tags: [admin-controller]
      summary: Listar usuários
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - name: params
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ListUsersRequestParams"
      responses:
        "200":
          description: Lista paginada de usuários
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageCompleteUserDTO"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/admin/users/{userId}/reset-mfa:
    post:
      tags: [admin-controller]
      summary: Resetar MFA de um usuário
      operationId: resetUserMfa
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: MFA resetado com sucesso
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/files:
    get:
      tags: [admin-controller]
      summary: Listar todos os arquivos (admin)
      operationId: listFiles_1
      security:
        - bearerAuth: []
      parameters:
        - name: params
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ListFilesRequestParams"
      responses:
        "200":
          description: Lista paginada de arquivos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageFileDTO"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/admin/files/{fileId}:
    get:
      tags: [admin-controller]
      summary: Obter arquivo com URL assinada (admin)
      operationId: getFile
      security:
        - bearerAuth: []
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Dados do arquivo com URL assinada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminFileSignedUrl"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [admin-controller]
      summary: Deletar arquivo (admin)
      operationId: deleteFile_1
      security:
        - bearerAuth: []
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Arquivo deletado
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /health:
    get:
      tags: [health-check-controller]
      summary: Verificar saúde da aplicação
      operationId: health
      security: []
      responses:
        "200":
          description: Aplicação saudável
          content:
            application/json:
              schema:
                type: object

  /v1/share-url/{shortUrl}:
    get:
      tags: [short-link-controller]
      summary: Redirecionar link curto de compartilhamento
      operationId: redirect
      security: []
      parameters:
        - name: shortUrl
          in: path
          required: true
          schema:
            type: string
        - name: jsonResponse
          in: query
          required: false
          description: Se `true`, retorna os dados em JSON em vez de redirecionar
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: |
            Dados do arquivo (quando `jsonResponse=true`).
            Retorna JSON se ?jsonResponse=true, caso contrário redireciona (302).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShortLinkUrlResponse"
              examples:
                exemplo:
                  summary: Exemplo de resposta JSON
                  value:
                    url: "https://files.example.com/file/abc123"
        "302":
          description: Redirecionamento para URL do arquivo (quando `jsonResponse` não está presente ou é `false`)
        "404":
          $ref: "#/components/responses/NotFound"

components:
  responses:
    Unauthorized:
      description: Não autenticado. Token ausente, inválido ou expirado.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Sem permissão para acessar este recurso.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Recurso não encontrado.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Dados inválidos na requisição.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        status:
          type: integer
          format: int32

    RequestPostFileDTO:
      type: object
      required: [fileSize]
      properties:
        fileName:
          type: string
          minLength: 1
          pattern: "^[^\\/:*?\"<>|.]{1,70}$"
        contentType:
          type: string
          minLength: 1
        fileSize:
          type: integer
          format: int64

    SignedUrlDTO:
      type: object
      properties:
        signedUrl:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: object
        fileId:
          type: integer
          format: int64
        expirationDate:
          type: string
          format: date-time

    SessionTransferRequest:
      type: object
      properties:
        target:
          type: string
          enum: [WEB, MOBILE]

    SessionTransferResponse:
      type: object
      properties:
        transferToken:
          type: string

    SessionExchangeRequest:
      type: object
      properties:
        token:
          type: string

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 6
          maxLength: 40

    SignupRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 0
          maxLength: 100
        email:
          type: string
          minLength: 0
          maxLength: 100
        password:
          type: string
          minLength: 6
          maxLength: 40

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    TokenResponse:
      type: object
      properties:
        refreshToken:
          type: string
        accessToken:
          type: string

    MfaJwtResponse:
      type: object
      description: Token temporário para fluxo de MFA
      properties:
        token:
          type: string
        type:
          type: string
          example: MFA

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          minLength: 0
          maxLength: 100
        password:
          type: string
          minLength: 6
          maxLength: 40

    MagicLoginRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          minLength: 0
          maxLength: 100

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          minLength: 0
          maxLength: 100

    InviteRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          minLength: 1
        name:
          type: string

    ListFilesRequestParams:
      type: object
      properties:
        page:
          type: integer
          format: int32
        rows:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
        sort:
          type: string
          enum: [asc, desc, ASC, DESC]
        uploaded:
          type: boolean

    FileDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        size:
          type: integer
          format: int64
        uploaded:
          type: boolean
        createdAt:
          type: string
          format: date-time
        shareUrl:
          type: string
        expiresIn:
          type: string
          format: date-time
        contentType:
          type: string

    PageFileDTO:
      type: object
      properties:
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/FileDTO"
        number:
          type: integer
          format: int32
        sort:
          $ref: "#/components/schemas/SortObject"
        first:
          type: boolean
        last:
          type: boolean
        numberOfElements:
          type: integer
          format: int32
        pageable:
          $ref: "#/components/schemas/PageableObject"
        empty:
          type: boolean

    PageableObject:
      type: object
      properties:
        offset:
          type: integer
          format: int64
        sort:
          $ref: "#/components/schemas/SortObject"
        pageNumber:
          type: integer
          format: int32
        paged:
          type: boolean
        pageSize:
          type: integer
          format: int32
        unpaged:
          type: boolean

    SortObject:
      type: object
      properties:
        empty:
          type: boolean
        unsorted:
          type: boolean
        sorted:
          type: boolean

    StorageDetails:
      type: object
      properties:
        totalQuota:
          type: integer
          format: int64
        usedQuota:
          type: integer
          format: int64

    UserInfoDTO:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        mfaEnabled:
          type: boolean
        hasAdminPrivileges:
          type: boolean
        storage:
          $ref: "#/components/schemas/StorageDetails"

    WhitelistEntryDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        invitedName:
          type: string
        status:
          type: string
          enum: [ALLOWED, PENDING]
        createdAt:
          type: string
          format: date-time

    PageWhitelistEntryDTO:
      type: object
      properties:
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/WhitelistEntryDTO"
        number:
          type: integer
          format: int32
        sort:
          $ref: "#/components/schemas/SortObject"
        first:
          type: boolean
        last:
          type: boolean
        numberOfElements:
          type: integer
          format: int32
        pageable:
          $ref: "#/components/schemas/PageableObject"
        empty:
          type: boolean

    ListUsersRequestParams:
      type: object
      properties:
        page:
          type: integer
          format: int32
        rows:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
        sort:
          type: string
          enum: [asc, desc, ASC, DESC]

    CompleteUserDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
        role:
          type: string
        mfaSecret:
          type: string
        mfaEnabled:
          type: boolean
        totalSize:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        settings:
          $ref: "#/components/schemas/UserSettingsProjection"
    ShortLinkUrlResponse:
      type: object
      description: Resposta JSON ao acessar o link curto com ?jsonResponse=true
      properties:
        url:
          type: string
          description: URL original do arquivo

    PageCompleteUserDTO:
      type: object
      properties:
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/CompleteUserDTO"
        number:
          type: integer
          format: int32
        sort:
          $ref: "#/components/schemas/SortObject"
        first:
          type: boolean
        last:
          type: boolean
        numberOfElements:
          type: integer
          format: int32
        pageable:
          $ref: "#/components/schemas/PageableObject"
        empty:
          type: boolean

    UserSettingsProjection:
      type: object
      properties:
        storageLimitBytes:
          type: integer
          format: int64
        maxFileRetentionDays:
          type: integer
          format: int32
        modifiedAt:
          type: string
          format: date-time

    AdminFileSignedUrl:
      type: object
      properties:
        signedUrl:
          type: string
        timestamps:
          $ref: "#/components/schemas/UrlTimestamps"

    UrlTimestamps:
      type: object
      properties:
        creationTime:
          type: string
          format: date-time
        expirationTime:
          type: string
          format: date-time

  securitySchemes:
    bearerAuth:
      type: http
      description: |
        JWT de acesso obtido via login.
        Envie no header: `Authorization: Bearer <access-token>`
      scheme: bearer
      bearerFormat: JWT
    mfaAuth:
      type: http
      description: |
        Token temporário de MFA retornado em `/v1/api/auth/mfa/setup/initiate`
        ou no login quando MFA está habilitado.
        Envie no header: `Authorization: Bearer <mfa-token>`
      scheme: bearer
      bearerFormat: JWT
